    </div>
    <!-- Header / Branding -->

    </header>
    <!-- Main Content Canvas -->
    <main
      class="relative z-10 flex min-h-screen items-center justify-center px-6 pt-24 pb-12"
    >
      <!-- Login Card -->
      <div
        class="w-full max-w-[450px] bg-surface-container-lowest/80 backdrop-blur-3xl p-8 md:p-16 rounded-xl border border-outline-variant/10 shadow-2xl"
      >
        <h1
          class="text-3xl font-extrabold text-on-surface mb-8 font-headline tracking-tight"
        >
          Sign In
        </h1>
        <form id="siginform" class="space-y-4">
          <!-- Email/Mobile Field -->
          <div class="space-y-1">
            <div class="relative group">
              <input
                class="peer w-full bg-surface-container-highest border-b-2 border-transparent px-4 pt-6 pb-2 text-on-surface focus:outline-none focus:border-primary transition-all duration-300 rounded-lg"
                id="username"
                placeholder=" "
                type="text"
                required
              />
              <label
                class="absolute left-4 top-4 text-zinc-500 text-sm font-medium transition-all duration-300 peer-focus:top-1 peer-focus:text-xs peer-focus:text-primary-fixed-dim peer-[:not(:placeholder-shown)]:top-1 peer-[:not(:placeholder-shown)]:text-xs"
                for="username"
              >
                Username
              </label>
            </div>
          </div>
          <!-- Password Field -->
          <div class="space-y-1">
            <div class="relative group">
              <input
                class="peer w-full bg-surface-container-highest border-b-2 border-transparent px-4 pt-6 pb-2 text-on-surface focus:outline-none focus:border-primary transition-all duration-300 rounded-lg"
                id="password"
                placeholder=" "
                type="password"
                required
              />
              <label
                class="absolute left-4 top-4 text-zinc-500 text-sm font-medium transition-all duration-300 peer-focus:top-1 peer-focus:text-xs peer-focus:text-primary-fixed-dim peer-[:not(:placeholder-shown)]:top-1 peer-[:not(:placeholder-shown)]:text-xs"
                for="password"
              >
                Password
              </label>
            </div>
          </div>
            <p id="error-text" class="text-red-500 text-xs hidden"></p>
          <!-- Action Button -->
          <button
                  id="submitBtn"
            class="w-full bg-primary-container text-on-primary-container font-extrabold py-3.5 rounded-lg hover:opacity-90 active:scale-95 transition-all duration-200 mt-6 shadow-lg shadow-primary-container/20"
            type="submit"
          >
            Sign In
          </button>
          <!-- Secondary Actions -->
          <div class="flex items-center justify-between mt-4">
            <label class="flex items-center space-x-2 cursor-pointer group">
              <div
                class="relative flex items-center justify-center w-5 h-5 bg-surface-container-high rounded border border-outline-variant group-hover:border-primary transition-colors"
              >
                <input class="peer hidden" type="checkbox" />
                <span
                  class="material-symbols-outlined text-xs text-on-primary scale-0 peer-checked:scale-100 transition-transform"
                  >check</span

              <span class="text-zinc-400 text-xs font-label">Remember me</span>
            </label>
            <a class="text-zinc-400 text-xs font-label hover:underline" href="#"

        </form>
        <!-- Footer of Card -->
        <div class="mt-12 space-y-4">

            <span class="text-zinc-500 font-label">New to ReelMatch?</span>

<script>
  // Changed this ID to match your HTML form id="siginform"
  document.getElementById('siginform').addEventListener('submit', async (e) => {
    e.preventDefault();

    const username = document.getElementById('username').value;
    const password = document.getElementById('password').value;
    const errorText = document.getElementById('error-text');
    const submitBtn = document.getElementById('submitBtn');

    errorText.classList.add('hidden');
    submitBtn.innerText = "Authenticating...";
    submitBtn.disabled = true;

    try {
      const response = await fetch('/api/login/', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'X-CSRFToken': '{{ csrf_token }}' // This tells Django the request is safe
        },
        body: JSON.stringify({ username, password })
      });

      const data = await response.json();

      if (response.ok) {
        // We save the "Role" sent from views.py
        localStorage.setItem('token', data.token);
        localStorage.setItem('is_staff', data.is_staff);
        localStorage.setItem('username', data.username);

        // JavaScript handles the move to the page served by your homeFeed view
        window.location.href = '/homeFeed/';
      } else {
        errorText.innerText = data.error || "Login failed.";
        errorText.classList.remove('hidden');
      }
    } catch (err) {
      errorText.innerText = "Connection error. Is the server running?";
      errorText.classList.remove('hidden');
    } finally {
      submitBtn.innerText = "Sign In";
      submitBtn.disabled = false;
    }
  });
</script>

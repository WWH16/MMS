<!doctype html>
<html class="dark" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Sign Up | ReelMatch</title>
    <!-- Tailwind CDN — must load BEFORE the config script -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    {% load static %}
    <!-- Tailwind theme config (single source of truth for all pages) -->
    <script src="{% static 'accounts/js/Tailwind.config.js' %}"></script>

    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&family=Be+Vietnam+Pro:wght@400;500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <style>
      .material-symbols-outlined {
        font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 24;
      }
      .cinematic-overlay {
        background: linear-gradient(to top, rgba(19,19,19,0.9) 0%, rgba(19,19,19,0.4) 50%, rgba(19,19,19,0.8) 100%);
      }
      @keyframes spin { to { transform: rotate(360deg); } }

      /* ── Material Outlined Text Field ── */
      .md-outlined {
        position: relative;
        margin-top: 0.25rem;
      }
      .md-outlined input {
        width: 100%;
        background: #353534;
        border: 1.5px solid #3a3939;       /* Changed from #5e3f3b to neutral gray */
        border-radius: 0.5rem;
        padding: 1.1rem 1rem 0.6rem 1rem;
        color: #e5e2e1;
        font-size: 0.95rem;
        font-family: 'Be Vietnam Pro', sans-serif;
        outline: none;
        transition: border-color 0.2s, border-width 0.1s;
        box-sizing: border-box;
        caret-color: #ffb4aa;
      }
      .md-outlined input:focus {
        border-color: #ffb4aa;
        border-width: 2px;
        outline: none !important;
        box-shadow: none !important;
      }
      .md-outlined input[type="password"]::-ms-reveal {
        filter: invert(1) brightness(2);
      }

      /* Label — resting state */
      .md-outlined label {
        position: absolute;
        left: 0.9rem;
        top: 50%;
        transform: translateY(-50%) scale(1);
        transform-origin: left center;
        font-size: 0.95rem;
        font-family: 'Inter', sans-serif;
        color: #71717a;
        pointer-events: none;
        transition: top 0.18s ease, transform 0.18s ease, color 0.18s ease, background 0.18s ease;
        background: transparent;
        padding: 0;
        line-height: 1;
        white-space: nowrap;
      }

      /* Floating state */
      .md-outlined input:focus + label,
      .md-outlined input:not(:placeholder-shown) + label {
        top: 0;
        transform: translateY(-50%) scale(0.78);
        color: #ffb4aa;
        background: #353534;
        padding: 0 4px;
      }

      /* Hide browser placeholder */
      .md-outlined input::placeholder {
        color: transparent;
      }

      /* Error state */
      .md-outlined.has-error input {
        border-color: #ffb4ab;
      }
      .md-outlined.has-error input:focus + label,
      .md-outlined.has-error input:not(:placeholder-shown) + label {
        color: #ffb4ab;
      }
      /* Ensure reCAPTCHA v3 badge is visible */
      .grecaptcha-badge { 
        z-index: 9999 !important; 
      }
    </style>
  </head>
  <body class="bg-background font-body text-on-surface antialiased selection:bg-primary-container selection:text-on-primary-container">

    <!-- Background -->
    <div class="fixed inset-0 z-0 overflow-hidden">
      <img alt="" class="w-full h-full object-cover scale-105"
        src="https://lh3.googleusercontent.com/aida-public/AB6AXuCz8LJh3Ba8INECTPowNfLIiXQxtSwZxrmPMcW768F6fe74d6SISS_rGRrOxVnWOCoU6up7tEyVlMzEaMhnb7bJhzyBz8pQLBtPNbq_KifNsSDVnYZD3dRHFqSTWRkRsGGyV5lW9J4Wab7ZWJ822SgaeP22keE2wIy2lu6C2hPGnpBkPWZ8jmfa9MR4CRGLDuUTFLHsoUbzwtMlbtKlwVQmqwCcrzO6Q4u50EkrXThc53scf94gk4KeAN-595ANV4fOMJvxvNWcdoEc" />
      <div class="absolute inset-0 cinematic-overlay"></div>
    </div>

    <!-- Header -->
    <header class="fixed top-0 w-full z-50 flex justify-between items-center px-8 py-6 bg-transparent backdrop-blur-xl">
      <a href="{% url 'index' %}" class="text-2xl font-black text-red-600 tracking-tighter font-headline uppercase">ReelMatch</a>
    </header>

    <script src="https://www.google.com/recaptcha/api.js?render={{ recaptcha_site_key }}"></script>

    <!-- Main -->
    <main class="relative z-10 flex min-h-screen items-center justify-center px-6 pt-24 pb-12">
      <div class="w-full max-w-[450px] bg-surface-container-lowest/80 backdrop-blur-3xl p-8 md:p-16 rounded-xl border border-outline-variant/10 shadow-2xl">

        <h1 class="text-3xl font-extrabold text-on-surface mb-2 font-headline tracking-tight">Create Account</h1>
        <p class="text-on-surface/50 text-sm font-label mb-8">Start discovering films made for you.</p>

        <form id="signupForm" class="space-y-5">

          <!-- Username -->
          <div class="md-outlined">
            <input id="username" type="text" placeholder=" " required autocomplete="username" />
            <label for="username">Username</label>
          </div>
          <p id="username-error" class="text-red-500 text-xs hidden !mt-1"></p>

          <!-- Password -->
          <div class="md-outlined">
            <input id="password" type="password" placeholder=" " required autocomplete="new-password" />
            <label for="password">Password</label>
          </div>
          <p id="password-error" class="text-red-500 text-xs hidden !mt-1"></p>

          <!-- Confirm Password -->
          <div class="md-outlined">
            <input id="confirm_password" type="password" placeholder=" " required autocomplete="new-password" />
            <label for="confirm_password">Confirm Password</label>
          </div>
          <p id="confirm-error" class="text-red-500 text-xs hidden !mt-1"></p>

          <button id="signupBtn"
            class="w-full bg-primary-container text-on-primary-container font-extrabold py-3.5 rounded-lg hover:opacity-90 active:scale-95 transition-all duration-200 mt-2 shadow-lg shadow-primary-container/20"
            type="submit">
            Create Account
          </button>

        </form>

        <div class="mt-10 space-y-2">
          <div class="flex items-center gap-1">
            <span class="text-zinc-500 font-label text-sm">Already have an account?</span>
            <a class="text-on-surface font-bold hover:underline text-sm" href="{% url 'signin' %}">Sign in.</a>
          </div>
        </div>
      </div>
    </main>

    <!-- Footer -->
    <footer class="relative z-10 w-full py-10 flex flex-col items-center gap-4 bg-zinc-950/80 backdrop-blur-md">
      <div class="text-lg font-black text-red-600 font-headline uppercase">ReelMatch</div>
      <div class="flex flex-wrap justify-center gap-6">
        <a class="text-xs text-zinc-500 hover:text-zinc-200 font-label uppercase tracking-widest transition-colors" href="#">FAQ</a>
        <a class="text-xs text-zinc-500 hover:text-zinc-200 font-label uppercase tracking-widest transition-colors" href="#">Privacy Policy</a>
        <a class="text-xs text-zinc-500 hover:text-zinc-200 font-label uppercase tracking-widest transition-colors" href="#">Terms of Use</a>
      </div>
      <p class="text-xs text-zinc-600 font-label">© 2024 ReelMatch. All Rights Reserved.</p>
    </footer>

    <script>
      document.getElementById('signupForm').addEventListener('submit', async (e) => {
        e.preventDefault();

        // Clear previous errors and remove error state from fields
        document.querySelectorAll('[id$="-error"]').forEach(el => el.classList.add('hidden'));
        document.querySelectorAll('.md-outlined').forEach(el => el.classList.remove('has-error'));

        const username        = document.getElementById('username').value;
        const password        = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirm_password').value;
        const signupBtn       = document.getElementById('signupBtn');

        // Client-side password match check
        if (password !== confirmPassword) {
          const el = document.getElementById('confirm-error');
          el.innerText = "Passwords do not match.";
          el.classList.remove('hidden');
          document.getElementById('confirm_password').closest('.md-outlined').classList.add('has-error');
          return;
        }

        signupBtn.innerHTML = '<span style="display:inline-flex;align-items:center;justify-content:center;gap:8px;"><svg style="animation:spin 0.8s linear infinite;width:18px;height:18px;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83" stroke-linecap="round"/></svg>Creating Account…</span>';
        signupBtn.disabled = true;

        try {
          if (typeof grecaptcha === 'undefined') {
            throw new Error('reCAPTCHA not loaded. Check your site key and internet connection.');
          }

          const recaptchaToken = await grecaptcha.execute('{{ recaptcha_site_key }}', {action: 'signup'});

          const response = await fetch('/api/signup/', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'X-CSRFToken': '{{ csrf_token }}' },
            body: JSON.stringify({ username, password, recaptcha_token: recaptchaToken })
          });

          const data = await response.json();

          if (response.ok) {
            // Clear both first to avoid stale data
            localStorage.removeItem('token');
            localStorage.removeItem('is_staff');
            localStorage.removeItem('username');
            sessionStorage.removeItem('token');
            sessionStorage.removeItem('is_staff');
            sessionStorage.removeItem('username');

            localStorage.setItem('token', data.token);
            localStorage.setItem('is_staff', data.is_staff);
            localStorage.setItem('username', data.username);
            window.location.href = '/homeFeed/';
          } else {
            if (data.username) {
              const el = document.getElementById('username-error');
              el.innerText = data.username[0];
              el.classList.remove('hidden');
              document.getElementById('username').closest('.md-outlined').classList.add('has-error');
            } else if (data.password) {
              const el = document.getElementById('password-error');
              el.innerText = data.password[0];
              el.classList.remove('hidden');
              document.getElementById('password').closest('.md-outlined').classList.add('has-error');
            } else {
              alert(data.error || "Signup failed.");
            }
          }
        } catch (err) {
          console.error('Sign-up error:', err);
          alert(err.message || "Connection error. Is the server running?");
        } finally {
          signupBtn.innerHTML = "Create Account";
          signupBtn.disabled  = false;
        }
      });
    </script>
  </body>
</html>

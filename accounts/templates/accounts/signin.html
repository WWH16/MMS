<!doctype html>
<html class="dark" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Sign In | ReelMatch</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&family=Be+Vietnam+Pro:wght@400;500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "inverse-on-surface": "#313030", "on-secondary-fixed-variant": "#8e1210",
              "inverse-primary": "#c0000c", "primary-fixed": "#ffdad5", "error-container": "#93000a",
              background: "#131313", "surface-container-low": "#1c1b1b", "primary-container": "#e50914",
              "surface-container-high": "#2a2a2a", primary: "#ffb4aa", "on-primary-fixed": "#410001",
              tertiary: "#a7c8ff", "on-error": "#690005", "surface-bright": "#3a3939",
              outline: "#af8782", "on-secondary-container": "#ff9f93", "on-tertiary-fixed-variant": "#004689",
              "surface-container": "#201f1f", "on-secondary": "#690003", surface: "#131313",
              "on-primary-fixed-variant": "#930007", "on-surface": "#e5e2e1", "inverse-surface": "#e5e2e1",
              "surface-container-highest": "#353534", "secondary-container": "#921512",
              "on-background": "#e5e2e1", "secondary-fixed": "#ffdad5", "tertiary-fixed": "#d5e3ff",
              "surface-dim": "#131313", "tertiary-container": "#0072d7", error: "#ffb4ab",
              "on-primary-container": "#fff7f6", "surface-tint": "#ffb4aa", "on-primary": "#690003",
              "surface-container-lowest": "#0e0e0e", secondary: "#ffb4aa",
              "on-tertiary-container": "#f8f9ff", "primary-fixed-dim": "#ffb4aa",
              "secondary-fixed-dim": "#ffb4aa", "on-error-container": "#ffdad6",
              "tertiary-fixed-dim": "#a7c8ff", "surface-variant": "#353534",
              "on-tertiary": "#003061", "outline-variant": "#5e3f3b",
              "on-tertiary-fixed": "#001b3c", "on-surface-variant": "#e9bcb6", "on-secondary-fixed": "#410001",
            },
            borderRadius: { DEFAULT: "0.125rem", lg: "0.25rem", xl: "0.5rem", full: "0.75rem" },
            fontFamily: { headline: ["Manrope"], body: ["Be Vietnam Pro"], label: ["Inter"] },
          },
        },
      };
    </script>
    <style>
      .material-symbols-outlined {
        font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 24;
      }
      .cinematic-overlay {
        background: linear-gradient(
          to top, rgba(19,19,19,0.9) 0%, rgba(19,19,19,0.4) 50%, rgba(19,19,19,0.8) 100%
        );
      }
      @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Material Outlined Text Field ── */
    .md-outlined {
      position: relative;
      margin-top: 0.25rem;
    }
    /* Input keeps original surface-container-highest bg + on-surface text */
    .md-outlined input {
      width: 100%;
      background: #353534;
      border: 1.5px solid #3a3939;  /* Changed from #5e3f3b to neutral gray */
      border-radius: 0.5rem;
      padding: 1.1rem 1rem 0.6rem 1rem;
      color: #e5e2e1;
      font-size: 0.95rem;
      font-family: 'Be Vietnam Pro', sans-serif;
      outline: none;
      transition: border-color 0.2s, border-width 0.1s;
      box-sizing: border-box;
      caret-color: #ffb4aa;
    }
    .md-outlined input:focus {
      border-color: #ffb4aa;
      border-width: 2px;
      outline: none !important;
      box-shadow: none !important;
    }
      .md-outlined input:focus {
        border-color: #ffb4aa;
        border-width: 2px;
      }
      .md-outlined input[type="password"]::-ms-reveal { filter: invert(1) brightness(2); }

      /* Label — resting: vertically centred inside the box */
      .md-outlined label {
        position: absolute;
        left: 0.9rem;
        top: 50%;
        transform: translateY(-50%) scale(1);
        transform-origin: left center;
        font-size: 0.95rem;
        font-family: 'Inter', sans-serif;
        color: #71717a;                   /* zinc-500 — original placeholder colour */
        pointer-events: none;
        transition: top 0.18s ease, transform 0.18s ease, color 0.18s ease, background 0.18s ease;
        background: transparent;
        padding: 0;
        line-height: 1;
        white-space: nowrap;
      }
      /* Floating: label rises to sit on the top border line */
      .md-outlined input:focus + label,
      .md-outlined input:not(:placeholder-shown) + label {
        top: 0;
        transform: translateY(-50%) scale(0.78);
        color: #ffb4aa;
        background: #353534;             /* same as input bg — cuts through the border */
        padding: 0 4px;
      }
      /* Hide native placeholder; our label acts as one */
      .md-outlined input::placeholder { color: transparent; }

/* Error state — border only shows red after user interacts with the field */
      .md-outlined.has-error input:focus + label,
      .md-outlined.has-error input:not(:placeholder-shown) + label { border-color: #ffb4ab; }
      .md-outlined.has-error input:focus + label,
      .md-outlined.has-error input:not(:placeholder-shown) + label { color: #ffb4ab; }
      /* Ensure reCAPTCHA v3 badge is visible */
      .grecaptcha-badge { 
        z-index: 9999 !important; 
      }
    </style>
  </head>
  <body class="bg-background font-body text-on-surface antialiased selection:bg-primary-container selection:text-on-primary-container">

    <!-- Cinematic background -->
    <div class="fixed inset-0 z-0 overflow-hidden">
      <img alt="" class="w-full h-full object-cover scale-105"
        src="https://lh3.googleusercontent.com/aida-public/AB6AXuCz8LJh3Ba8INECTPowNfLIiXQxtSwZxrmPMcW768F6fe74d6SISS_rGRrOxVnWOCoU6up7tEyVlMzEaMhnb7bJhzyBz8pQLBtPNbq_KifNsSDVnYZD3dRHFqSTWRkRsGGyV5lW9J4Wab7ZWJ822SgaeP22keE2wIy2lu6C2hPGnpBkPWZ8jmfa9MR4CRGLDuUTFLHsoUbzwtMlbtKlwVQmqwCcrzO6Q4u50EkrXThc53scf94gk4KeAN-595ANV4fOMJvxvNWcdoEc" />
      <div class="absolute inset-0 cinematic-overlay"></div>
    </div>

    <!-- Header -->
    <header class="fixed top-0 w-full z-50 flex justify-between items-center px-8 py-6 bg-transparent backdrop-blur-xl">
      <a href="{% url 'index' %}" class="text-2xl font-black text-red-600 tracking-tighter font-headline uppercase">ReelMatch</a>
    </header>

    <script src="https://www.google.com/recaptcha/api.js?render={{ recaptcha_site_key }}"></script>

    <!-- Main -->
    <main class="relative z-10 flex min-h-screen items-center justify-center px-6 pt-24 pb-12">
      <div class="w-full max-w-[450px] bg-surface-container-lowest/80 backdrop-blur-3xl p-8 md:p-16 rounded-xl border border-outline-variant/10 shadow-2xl">

        <h1 class="text-3xl font-extrabold text-on-surface mb-8 font-headline tracking-tight">Sign In</h1>

        <form id="signinForm" class="space-y-5">

          <!-- Username -->
          <div class="md-outlined">
            <input id="username" type="text" placeholder=" " required autocomplete="username" />
            <label for="username">Username</label>
          </div>

          <!-- Password -->
          <div class="md-outlined">
            <input id="password" type="password" placeholder=" " required autocomplete="current-password" />
            <label for="password">Password</label>
          </div>

          <!-- Remember Me & Help -->
          <div class="flex items-center justify-between !mt-4">
            <label class="flex items-center gap-2 cursor-pointer group">
              <input type="checkbox" id="rememberMe" class="w-4 h-4 rounded border-white/10 bg-white/5 text-primary-container focus:ring-primary-container focus:ring-offset-background transition-all" />
              <span class="text-xs font-label text-zinc-400 group-hover:text-on-surface transition-colors">Remember me</span>
            </label>
            <a href="#" class="text-xs font-label text-zinc-500 hover:text-on-surface transition-colors">Need help?</a>
          </div>

          <!-- Error message -->
          <p id="error-text" class="text-red-500 text-xs hidden !mt-3"></p>

          <!-- Submit -->
          <button id="submitBtn"
            class="w-full bg-primary-container text-on-primary-container font-extrabold py-3.5 rounded-lg hover:opacity-90 active:scale-95 transition-all duration-200 mt-2 shadow-lg shadow-primary-container/20"
            type="submit">
            Sign In
          </button>
        </form>

        <!-- Card footer -->
        <div class="mt-12 space-y-4">
          <div class="flex items-center space-x-1.5">
            <span class="text-zinc-500 font-label">New to ReelMatch?</span>
            <a class="text-on-surface font-bold hover:underline" href="{% url 'signup' %}">Sign up now.</a>
          </div>
        </div>

      </div>
    </main>

    <!-- Footer -->
    <footer class="relative z-10 w-full py-12 flex flex-col items-center justify-center space-y-6 bg-zinc-950/80 backdrop-blur-md">
      <div class="text-lg font-black text-red-600 font-headline uppercase">ReelMatch</div>
      <div class="flex flex-wrap justify-center gap-x-8 gap-y-4 px-6">
        <a class="font-['Inter'] text-xs font-medium uppercase tracking-widest text-zinc-500 hover:text-zinc-200 transition-colors" href="#">FAQ</a>
        <a class="font-['Inter'] text-xs font-medium uppercase tracking-widest text-zinc-500 hover:text-zinc-200 transition-colors" href="#">Help Center</a>
        <a class="font-['Inter'] text-xs font-medium uppercase tracking-widest text-zinc-500 hover:text-zinc-200 transition-colors" href="#">Privacy Policy</a>
        <a class="font-['Inter'] text-xs font-medium uppercase tracking-widest text-zinc-500 hover:text-zinc-200 transition-colors" href="#">Terms of Use</a>
      </div>
      <p class="font-['Inter'] text-xs font-medium uppercase tracking-widest text-zinc-500 mt-4">© 2024 ReelMatch. All Rights Reserved.</p>
    </footer>

    <script>
      // Prefill username if remembered
      document.addEventListener('DOMContentLoaded', () => {
        const rememberedUser = localStorage.getItem('remembered_username');
        if (rememberedUser) {
          document.getElementById('username').value = rememberedUser;
          document.getElementById('rememberMe').checked = true;
        }
      });

      document.getElementById('signinForm').addEventListener('submit', async (e) => {
        e.preventDefault();

        const username   = document.getElementById('username').value;
        const password   = document.getElementById('password').value;
        const rememberMe = document.getElementById('rememberMe').checked;
        const errorText  = document.getElementById('error-text');
        const submitBtn  = document.getElementById('submitBtn');

        // Clear previous error state
        errorText.classList.add('hidden');
        document.querySelectorAll('.md-outlined').forEach(el => el.classList.remove('has-error'));

        submitBtn.innerHTML = '<span style="display:inline-flex;align-items:center;justify-content:center;gap:8px;"><svg style="animation:spin 0.8s linear infinite;width:18px;height:18px;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83" stroke-linecap="round"/></svg>Signing in…</span>';
        submitBtn.disabled = true;

        try {
          if (typeof grecaptcha === 'undefined') {
            throw new Error('reCAPTCHA not loaded. Check your site key and internet connection.');
          }
          
          const recaptchaToken = await grecaptcha.execute('{{ recaptcha_site_key }}', {action: 'login'});

          const response = await fetch('/api/login/', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'X-CSRFToken': '{{ csrf_token }}'
            },
            body: JSON.stringify({ username, password, recaptcha_token: recaptchaToken })
          });

          const data = await response.json();

          if (response.ok) {
            const storage = rememberMe ? localStorage : sessionStorage;
            
            // Clear both first to avoid stale data in the other storage
            localStorage.removeItem('token');
            localStorage.removeItem('is_staff');
            localStorage.removeItem('username');
            sessionStorage.removeItem('token');
            sessionStorage.removeItem('is_staff');
            sessionStorage.removeItem('username');

            // Set new data
            storage.setItem('token', data.token);
            storage.setItem('is_staff', data.is_staff);
            storage.setItem('username', data.username);

            if (rememberMe) {
              localStorage.setItem('remembered_username', data.username);
            } else {
              localStorage.removeItem('remembered_username');
            }

            window.location.href = '/homeFeed/';
          } else {
            errorText.innerText = data.error || "Login failed.";
            errorText.classList.remove('hidden');
            document.querySelectorAll('.md-outlined').forEach(el => el.classList.add('has-error'));
          }
        } catch (err) {
          console.error('Sign-in error:', err);
          errorText.innerText = err.message || "Connection error. Is the server running?";
          errorText.classList.remove('hidden');
        } finally {
          submitBtn.innerHTML = "Sign In";
          submitBtn.disabled  = false;
        }
      });
    </script>
  </body>
</html>
